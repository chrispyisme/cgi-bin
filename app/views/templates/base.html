<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav style="height: var(--nav-height); display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; border-bottom: 1px solid var(--bg-card);">

        <ul style="display: flex; list-style: none; gap: 2rem;">
            <li><a href="#/" style="color: var(--text-primary); text-decoration: none;">Home</a></li>
